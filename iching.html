        function castHexagram() {
            let lines = [];
            let lineHTML = "";
            let changingLines = [];

            for(let i = 0; i < 6; i++) {
                // 模拟三枚铜钱：正=3，背=2，总和6~9
                const coin1 = Math.random() > 0.5 ? 3 : 2;
                const coin2 = Math.random() > 0.5 ? 3 : 2;
                const coin3 = Math.random() > 0.5 ? 3 : 2;
                const total = coin1 + coin2 + coin3;

                let isYang = total % 2 === 1;   // 奇数为阳
                let isChanging = (total === 6 || total === 9); // 老阴或老阳为动爻

                lines.push(isYang ? "⚊" : "⚋");
                lineHTML += `<div style="font-size:2.2em; margin:8px 0;">${isYang ? "⚊ 阳" : "⚋ 阴"} ${isChanging ? '(动)' : ''}</div>`;

                if (isChanging) changingLines.push(i+1);
            }

            const randomIndex = Math.floor(Math.random() * fullHexagrams.length);
            const gua = fullHexagrams[randomIndex];

            let changingText = changingLines.length > 0 
                ? `<p><strong>动爻：</strong>第 ${changingLines.join("、")} 爻</p>` 
                : "<p>本卦安静，无动爻</p>";

            document.getElementById('guaResult').innerHTML = `
                <h2>${gua.id}　${gua.name}卦　${gua.en}</h2>
                <div style="margin:25px 0; line-height:1.1;">${lineHTML}</div>
                <p><strong>卦辞：</strong>${gua.meaning}</p>
                <p><strong>简要寓意：</strong>${gua.desc}</p>
                ${changingText}
                <p style="margin-top:25px; color:#aaa; font-size:0.92em;">

                    周易占卜重在“诚心”与后续自我体悟。
                </p>
            `;
